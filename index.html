<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prontuário Eletrônico</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
        <h1>Prontuário Eletrônico</h1>
        <p>Organize atendimentos, cadastre pacientes e registre prontuários de forma rápida e segura.</p>
        <div class="buttons">
            <button onclick="window.location.href='login.html'">Começar Agora</button>
            <button onclick="window.location.href='sobre.html'">Saiba Mais</button>
        </div>
    </div>
</div>

<script>
window.addEventListener('load', () => {
    const content = document.querySelector('.hero-content');
    content.style.opacity = 1;
    content.style.transform = 'translateY(0)';
});
</script>
</body>
</html>
