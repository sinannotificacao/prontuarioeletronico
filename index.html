<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prontuário Eletrônico</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

.hero {
  background-image: url('img/Veronica.jpeg');
  background-size: cover;
  background-position: center 30%;
  width: 100%;
  height: 100vh;
  position: relative;
}

.overlay {
  position: absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(135,206,250,0.2);
  z-index:1;
}

.cloud-left, .cloud-right {
  position: absolute;
  top: 0;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.9);
  z-index: 3;
  transition: all 2s ease-in-out;
}

.cloud-left { left:0; }
.cloud-right { right:0; }

.hero-content {
  position: absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  z-index:2;
  text-align: center;
  opacity: 0;
  transition: opacity 1s ease-in-out 2s;
}

.hero-content h1 {
  font-size: 2.8rem;
  margin-bottom: 20px;
  color: #fff;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

.hero-content .welcome {
  font-size: 1.5rem;
  padding: 15px 25px;
  background: rgba(173, 216, 230, 0.6);
  border-radius: 15px;
  display: inline-block;
  margin-bottom: 20px;
}

.hero-content .btn {
  padding: 15px 30px;
  font-size: 1.1rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #0066cc;
  color: white;
  transition: .3s ease;
}

.hero-content .btn:hover { background: #004a99; }

@media (max-width:768px) {
  .hero-content h1 { font-size: 2rem; }
  .hero-content .welcome { font-size: 1.2rem; padding: 10px 15px; }
  .hero-content .btn { width:100%; }
}
</style>
</head>

<body>
<div class="hero">
  <div class="overlay"></div>
  <div class="cloud-left"></div>
  <div class="cloud-right"></div>

  <div class="hero-content" id="hero-content">
    <h1>Prontuário Eletrônico</h1>
    <div class="welcome">Seja bem-vinda, Dra. Veronica!</div>
    <button class="btn" onclick="window.location.href='login.html'">Começar Agora</button>
  </div>
</div>

<script>
window.addEventListener('load', () => {
  document.querySelector('.cloud-left').style.transform = 'translateX(-100%)';
  document.querySelector('.cloud-right').style.transform = 'translateX(100%)';
  setTimeout(() => {
    document.getElementById('hero-content').style.opacity = 1;
  }, 2000);
});
</script>
</body>
</html>
