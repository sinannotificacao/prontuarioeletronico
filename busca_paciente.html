<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar/Cadastrar Paciente</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="container">
    <h1>Buscar ou Cadastrar Paciente</h1>

    <form id="buscar-form">
      <input type="text" id="nome-busca" placeholder="Nome do paciente" required>
      <input type="date" id="nasc-busca" placeholder="Data de nascimento" required>
      <button type="submit">Buscar</button>
    </form>

    <div id="resultados"></div>

    <div id="cadastro" style="display:none;">
      <h2>Cadastro de Novo Paciente</h2>
      <form id="cadastro-form">
        <input type="text" id="nome" placeholder="Nome completo" required>
        <input type="date" id="nascimento" required>
        <input type="text" id="cpf" placeholder="CPF" required>
        <input type="tel" id="telefone" placeholder="Telefone" required>
        <input type="text" id="endereco" placeholder="Endereço" required>
        <button type="submit">Cadastrar Paciente</button>
      </form>
    </div>
  </div>

  <script src="busca_paciente.js"></script>
</body>
</html>
