<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login Profissional</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #f0f4f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
  text-align: center;
  width: 350px;
}

h1 { margin-bottom: 20px; color: #333; }
input {
  width: 80%;
  padding: 10px;
  margin-bottom: 15px;
  font-size: 16px;
}
button {
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  background: #0066cc;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
button:hover { background: #004a99; }
#prof-info { margin-top: 20px; font-weight: bold; color: #333; }
#enter-btn { display: none; margin-top: 15px; }
</style>
</head>
<body>

<div class="container">
  <h1>Login Profissional</h1>
  <input type="text" id="reg-num" placeholder="Digite seu número de registro">
  <button onclick="buscarProfissional()">Verificar</button>

  <div id="prof-info"></div>
  <button id="enter-btn" onclick="entrar()">Entrar</button>
</div>

<script>
const profissionais = [
  { reg: '12345', nome: 'Dr. Ana Souza', especialidade: 'Cardiologia' },
  { reg: '23456', nome: 'Dr. Bruno Lima', especialidade: 'Dermatologia' },
  { reg: '34567', nome: 'Dra. Carla Mendes', especialidade: 'Pediatria' },
  { reg: '45678', nome: 'Dr. Diego Torres', especialidade: 'Ortopedia' },
  { reg: '56789', nome: 'Dra. Elisa Santos', especialidade: 'Ginecologia' }
];

function buscarProfissional() {
  const reg = document.getElementById('reg-num').value.trim();
  const prof = profissionais.find(p => p.reg === reg);
  const infoDiv = document.getElementById('prof-info');
  const enterBtn = document.getElementById('enter-btn');

  if (prof) {
    infoDiv.textContent = `Olá, ${prof.nome} - Especialidade: ${prof.especialidade}`;
    enterBtn.style.display = 'inline-block';
    localStorage.setItem('profissionalNome', prof.nome);
    localStorage.setItem('profissionalEspecialidade', prof.especialidade);
  } else {
    infoDiv.textContent = 'Número de registro não encontrado.';
    enterBtn.style.display = 'none';
  }
}

function entrar() {
  window.location.href = 'dashboard.html';
}
</script>

</body>
</html>
